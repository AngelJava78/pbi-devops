name: Crear rama qa_yymmdd al hacer push en qa

on:
  push:
    branches:
      - qa  # Cambia a 'qa' si tu rama se llama así

permissions:
  contents: write  # necesario para crear referencias con GITHUB_TOKEN

jobs:
  create-date-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Obtener SHA HEAD actual de qa
        id: head
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.ref.replace('refs/heads/', ''); // 'qa'

            const { data: refData } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${branch}`
            });

            core.setOutput('base_sha', refData.object.sha);
            core.setOutput('base_ref', branch);

      - name: Crear rama qa_yymmdd_mmss (con sufijo si ya existe)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const baseSha = '${{ steps.head.outputs.base_sha }}';

            // Fecha en zona horaria de CDMX, formato yymmdd -> qa_yyMMdd
            const tz = 'America/Mexico_City';
            const now = new Date();
            const dateFmt = new Intl.DateTimeFormat('en-CA', {
              timeZone: tz,
              year: '2-digit',
              month: '2-digit',
              day: '2-digit'
            });
            const dateParts = Object.fromEntries(dateFmt.formatToParts(now).map(p => [p.type, p.value]));
            const yymmdd = `${dateParts.year}${dateParts.month}${dateParts.day}`;

            // Partes de hora (HHmm, 24h, con ceros)
            const timeFmt = new Intl.DateTimeFormat('en-GB', {
              timeZone: tz,
              hour12: false,
              hour: '2-digit',
              minute: '2-digit'
            });
            const timeParts = Object.fromEntries(timeFmt.formatToParts(now).map(p => [p.type, p.value]));
            const hhmm = `${timeParts.hour}${timeParts.minute}`;

            const baseName = `qa_${yymmdd}_${hhmm}`;            

            async function createIfPossible(name) {
              try {
                await github.rest.git.createRef({
                  owner, repo,
                  ref: `refs/heads/${name}`,
                  sha: baseSha
                });
                return { ok: true, name };
              } catch (e) {
                if (e.status === 422 && /Reference already exists/i.test(e.message)) {
                  return { ok: false, exists: true };
                }
                throw e;
              }
            }

            // Intento sin sufijo, luego qa_yymmdd-2..-20
            let created = await createIfPossible(baseName);
            if (!created.ok && created.exists) {
              for (let i = 2; i <= 20; i++) {
                const candidate = `${baseName}-${i}`;
                const res = await createIfPossible(candidate);
                if (res.ok) { created = res; break; }
              }
            }

            if (!created.ok) {
              core.setFailed('No se pudo crear la rama con nombre basado en fecha.');
              return;
            }

            core.info(`✅ Rama creada: ${created.name} -> ${baseSha}`);
